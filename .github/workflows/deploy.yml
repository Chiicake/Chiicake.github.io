name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed site serves built assets
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          if [ -z "$PAGE_URL" ]; then
            echo "Missing page URL from deploy step."
            exit 1
          fi

          # Give CDN a short window to refresh.
          sleep 10

          HTML="$(curl -fsSL "$PAGE_URL")"

          if printf '%s' "$HTML" | grep -q '/src/main.tsx'; then
            echo "Deployment verification failed: site is serving source index.html (/src/main.tsx)."
            echo "Check Settings -> Pages and set Source to GitHub Actions."
            exit 1
          fi

          if ! printf '%s' "$HTML" | grep -q '/assets/'; then
            echo "Deployment verification failed: built asset references were not found in deployed index.html."
            exit 1
          fi
