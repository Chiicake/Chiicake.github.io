<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <title>Elliptic Curve y² = x³ - x + 1</title>
  <!-- Background Grid (Optional, keep light) -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="currentColor" />
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="100" y1="300" x2="700" y2="300" stroke="currentColor" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="400" y1="500" x2="400" y2="100" stroke="currentColor" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="710" y="305" font-family="monospace" font-size="16" fill="currentColor">x</text>
  <text x="395" y="90" font-family="monospace" font-size="16" fill="currentColor">y</text>

  <!-- Curve: y^2 = x^3 - x + 1 -->
  <!-- Roughly plotting the shape. It has a component to the left and a main branch to the right. -->
  <!-- Note: Since we are using viewBox 800x600, (400, 300) is origin. 1 unit ~ 100 pixels. -->
  <path d="M 310,120 Q 350,280 390,300 T 450,150 M 310,480 Q 350,320 390,300 T 450,450" fill="none" stroke="#6366f1" stroke-width="3" />
  <!-- More accurate cubic bezier for the right branch -->
  <path d="M 330,100 C 350,250 450,280 600,100 M 330,500 C 350,350 450,320 600,500" fill="none" stroke="#6366f1" stroke-width="3" />
  
  <!-- Sample points -->
  <circle cx="400" cy="200" r="5" fill="#f43f5e" />
  <circle cx="400" cy="400" r="5" fill="#f43f5e" />
  <text x="410" y="200" font-family="sans-serif" font-size="14" fill="currentColor">P(x, y)</text>
  <text x="410" y="415" font-family="sans-serif" font-size="14" fill="currentColor">P'(x, -y)</text>

  <!-- Equation -->
  <text x="450" y="150" font-family="serif" font-style="italic" font-size="20" fill="#6366f1">y² = x³ + ax + b</text>
</svg>
