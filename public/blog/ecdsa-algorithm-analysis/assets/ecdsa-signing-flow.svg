<svg viewBox="0 0 900 350" xmlns="http://www.w3.org/2000/svg">
  <title>ECDSA Signing Process Flowchart</title>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="currentColor" />
    </marker>
  </defs>

  <!-- Step 1: Input -->
  <rect x="20" y="140" width="120" height="60" rx="10" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="2" />
  <text x="80" y="175" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="currentColor">Message (M)</text>
  <line x1="140" y1="170" x2="175" y2="170" stroke="currentColor" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Step 2: Hash -->
  <rect x="185" y="140" width="120" height="60" rx="10" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="2" />
  <text x="245" y="170" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="currentColor">Hash (SHA-256)</text>
  <text x="245" y="185" text-anchor="middle" font-family="sans-serif" font-size="12" fill="currentColor">z = hash(M)</text>
  <line x1="305" y1="170" x2="340" y2="170" stroke="currentColor" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Step 3: Ephemeral Key -->
  <rect x="350" y="40" width="160" height="60" rx="10" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="2" />
  <text x="430" y="70" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="currentColor">Generate Random k</text>
  <text x="430" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" fill="currentColor">(Nonce)</text>
  <line x1="430" y1="100" x2="430" y2="135" stroke="currentColor" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Step 4: Compute R -->
  <rect x="350" y="140" width="160" height="60" rx="10" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="2" />
  <text x="430" y="170" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="currentColor">Point (x, y) = k × G</text>
  <text x="430" y="185" text-anchor="middle" font-family="sans-serif" font-size="12" fill="currentColor">r = x (mod n)</text>
  <line x1="510" y1="170" x2="545" y2="170" stroke="currentColor" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Step 5: Compute S -->
  <rect x="555" y="140" width="180" height="60" rx="10" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="2" />
  <text x="645" y="170" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="currentColor">s = k⁻¹(z + rd)</text>
  <text x="645" y="185" text-anchor="middle" font-family="sans-serif" font-size="12" fill="currentColor">(mod n)</text>
  <line x1="735" y1="170" x2="770" y2="170" stroke="currentColor" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Step 6: Output -->
  <rect x="780" y="140" width="100" height="60" rx="10" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="2" />
  <text x="830" y="175" text-anchor="middle" font-family="sans-serif" font-weight="bold" fill="currentColor">Sig (r, s)</text>

  <!-- Legend -->
  <text x="350" y="250" font-family="sans-serif" font-size="14" fill="currentColor">n: order of curve</text>
  <text x="350" y="270" font-family="sans-serif" font-size="14" fill="currentColor">d: private key</text>
  <text x="350" y="290" font-family="sans-serif" font-size="14" fill="currentColor">G: generator point</text>
</svg>
